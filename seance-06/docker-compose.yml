# Stack complète Anfa : Airflow + MinIO + Spark
# Airflow orchestre le pipeline de la séance 5.

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    MINIO_ENDPOINT: "http://minio:9000"
    MINIO_ACCESS_KEY: "anfa-app-key"
    MINIO_SECRET_KEY: "anfa-app-secret-2026"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock   # pour soumettre Spark via docker exec
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:16-alpine
    container_name: anfa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # Service éphémère : initialise la DB et crée l'admin (Exited 0 après).
  airflow-init:
    <<: *airflow-common
    container_name: anfa-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Anfa --lastname Admin \
          --role Admin --email admin@anfa.example

  airflow-scheduler:
    <<: *airflow-common
    container_name: anfa-airflow-scheduler
    restart: unless-stopped
    command: bash -c "pip install boto3 docker && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: anfa-airflow-webserver
    restart: unless-stopped
    command: bash -c "pip install boto3 docker && airflow webserver"
    ports:
      - "8088:8080"          # UI Airflow : localhost:8088
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    container_name: anfa-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: anfa-admin
      MINIO_ROOT_PASSWORD: anfa-password-2026
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  spark-master:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-master
    restart: unless-stopped
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "7077:7077"
      - "8090:8080"          # UI Spark : localhost:8090 (8080 réservé Airflow)
    volumes:
      - ./scripts:/opt/scripts
      - ../data/referentiel:/opt/data/referentiel:ro
    command: >
      /opt/spark/sbin/start-master.sh

  spark-worker:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    ports:
      - "8081:8081"
    volumes:
      - ./scripts:/opt/scripts
      - ../data/referentiel:/opt/data/referentiel:ro
    command: >
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077

volumes:
  postgres-data:
  minio-data:
