# minio-deployment.yaml
# ─────────────────────────────────────────────────────────────
# Déploiement de MinIO : K8s va créer et maintenir 1 pod MinIO.
# Si le pod meurt, le Deployment en recrée un automatiquement.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
          - server
          - /data
          - --console-address
          - ":9001"
        env:
          - name: MINIO_ROOT_USER
            value: "anfa-admin"
          - name: MINIO_ROOT_PASSWORD
            value: "anfa-password-2026"
        ports:
          - name: api
            containerPort: 9000
          - name: console
            containerPort: 9001
        volumeMounts:
          - name: data
            mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
