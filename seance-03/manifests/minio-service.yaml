# minio-service.yaml
# ─────────────────────────────────────────────────────────────
# Service : adresse réseau stable qui pointe vers les pods MinIO.
# Type NodePort : expose le service sur un port de chaque nœud du cluster.

apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
