services:

  minio:
    image: minio/minio:latest
    container_name: anfa-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: anfa-admin
      MINIO_ROOT_PASSWORD: anfa-password-2026
      MINIO_IDENTITY_OPENID_CONFIG_URL: "http://keycloak:8080/realms/bigdata-securite/.well-known/openid-configuration"
      MINIO_IDENTITY_OPENID_CLIENT_ID: "minio-client"
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: "minio-client-secret-2026"
      MINIO_IDENTITY_OPENID_SCOPES: "openid"
    volumes:
      - minio-data:/data
      - ~/certs:/root/.minio/certs:ro
    command: server /data --console-address ":9001"

  spark-master:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-master
    restart: unless-stopped
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./jobs:/opt/jobs
      - ../data/referentiel:/opt/data/referentiel:ro
    command: >
      /opt/spark/sbin/start-master.sh

  spark-worker-1:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-worker-1
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    ports:
      - "8081:8081"
    volumes:
      - ./jobs:/opt/jobs
      - ../data/referentiel:/opt/data/referentiel:ro
    command: >
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077

  spark-worker-2:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-worker-2
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    ports:
      - "8082:8081"
    volumes:
      - ./jobs:/opt/jobs
      - ../data/referentiel:/opt/data/referentiel:ro
    command: >
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: anfa-keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin_demo_non_secure
    ports:
      - "8086:8080"

volumes:
  minio-data:
